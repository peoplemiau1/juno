name: Tests

on:
  push:
    branches:
      - main
      - fix-enum-member-access
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: sudo python3 install.py

      - name: Run tests
        run: python3 run_tests.py
